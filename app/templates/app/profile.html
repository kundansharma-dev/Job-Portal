{% extends 'app/base1.html' %}
{% load static %}

{% block content %}

<!-- Start home -->
<section class="bg-half page-next-level">
    <div class="bg-overlay"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center text-white">
                    <h4 class="text-uppercase title mb-4">Candidate Profile</h4>
                    <ul class="page-next d-inline-block mb-0">
                        <li>
                            <a href="/" class="text-uppercase font-weight-bold">Home</a>
                        </li>
                        <li>
                            <span class="text-uppercase text-white font-weight-bold">
                                Candidate Profile
                            </span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- POST A JOB START -->
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="rounded shadow bg-white p-4">
                    <div class="custom-form">

                        <h4 class="text-dark mb-3">Update Your Profile</h4>

                        <form method="post" action="{% url 'updateprofile' pk=can.id %}" enctype="multipart/form-data">
                            {% csrf_token %}

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Firstname</label>
                                        <input type="text" name="firstname" class="form-control resume"
                                            value="{{can.firstname}}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Lastname</label>
                                        <input type="text" name="lastname" class="form-control resume"
                                            value="{{can.lastname}}">
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Job Type</label>
                                        <select name="job_type" class="form-control">
                                            <option value="Full Time">Full Time</option>
                                            <option value="Part Time">Part Time</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Job Category</label>
                                        <select name="job_catagry" class="form-control">
                                            <option value="Web Developer">Web Developer</option>
                                            <option value="PHP Developer">PHP Developer</option>
                                            <option value="Web Designer">Web Designer</option>
                                            <option value="Graphic Designer">Graphic Designer</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">City</label>
                                        <input type="text" name="city" class="form-control resume" value="{{can.city}}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Country</label>
                                        <input type="text" name="country" class="form-control resume"
                                            value="{{can.country}}">
                                    </div>
                                </div>
                            </div>

                            <!-- ✅ ADDED (MISSING FIELDS START HERE) -->
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Address</label>
                                        <input type="text" name="address" class="form-control resume"
                                            value="{{can.address}}">
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Date of Birth</label>
                                        <input type="text" name="dob" class="form-control resume" value="{{can.dob}}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Gender</label>
                                        <select name="gender" class="form-control">
                                            <option value="Male" {% if can.gender == "Male" %}selected{% endif %}>Male
                                            </option>
                                            <option value="Female" {% if can.gender == "Female" %}selected{% endif %}>
                                                Female</option>
                                            <option value="Other" {% if can.gender == "Other" %}selected{% endif %}>Other
                                            </option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <!-- ✅ ADDED (MISSING FIELDS END HERE) -->

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Minimum Salary</label>
                                        <input type="text" name="min_salary" class="form-control resume"
                                            value="{{can.min_salary}}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Maximum Salary</label>
                                        <input type="text" name="max_salary" class="form-control resume"
                                            value="{{can.max_salary}}">
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Website</label>
                                        <input type="url" name="website" class="form-control resume"
                                            value="{{can.website}}">
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Email Address</label>
                                        <input type="email" name="email" class="form-control resume"
                                            value="{{user.email}}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Phone Number</label>
                                        <input type="text" name="contact" class="form-control resume"
                                            value="{{can.contact}}">
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group app-label mt-2">
                                        <label class="text-muted">Job Description</label>
                                        <textarea name="job_description" rows="6"
                                            class="form-control resume">{{can.job_description}}</textarea>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-12">
                                    <ul class="list-inline mb-0">
                                        <li class="list-inline-item">
                                            <div class="input-group mt-2 mb-2">
                                                <div class="custom-file">
                                                    <input type="file" name="profile_pic" class="custom-file-input">
                                                    <label class="custom-file-label rounded">
                                                        <i class="mdi mdi-cloud-upload mr-1"></i> Upload Files
                                                    </label>
                                                </div>
                                            </div>
                                        </li>
                                    </ul>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-lg-12 mt-3">
                                    <button type="submit" class="btn btn-primary">Save</button>
                                </div>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
